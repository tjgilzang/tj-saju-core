<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>TJ 사주 Firebase 적재 대시보드</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      margin: 0;
      background: #0d1117;
      color: #f5f7ff;
    }
    header {
      padding: 2rem;
      background: linear-gradient(135deg, #1f6feb, #6f3efb);
      box-shadow: 0 5px 20px rgba(0,0,0,.4);
    }
    header h1 {
      margin: 0;
      font-size: 2rem;
    }
    main {
      padding: 2rem;
    }
    section.card {
      background: #161b22;
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 10px 35px rgba(0,0,0,.25);
    }
    section.card h2 {
      margin-top: 0;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .metric {
      display: inline-flex;
      align-items: center;
      font-size: 1.25rem;
      margin-bottom: .25rem;
    }
    .metric span {
      font-weight: 700;
      margin-right: .25rem;
      font-size: 2rem;
    }
    .program-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: 1rem;
    }
    .program-list li {
      background: rgba(255,255,255,.04);
      border-radius: 10px;
      padding: 1rem;
    }
    .program-list li strong {
      display: block;
      margin-bottom: .5rem;
    }
    .status-label {
      display: inline-flex;
      align-items: center;
      gap: .25rem;
      padding: .2rem .6rem;
      border-radius: 999px;
      font-size: .85rem;
    }
    .status-label.success {
      background: rgba(16,185,129,.16);
      color: #10b981;
    }
    .status-label.warning {
      background: rgba(250,204,21,.14);
      color: #facc15;
    }
    footer {
      padding: 1.5rem;
      text-align: center;
      color: rgba(255,255,255,.6);
      font-size: .85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Firebase 적재 상태 대시보드</h1>
    <p>프로그램별 raw 데이터를 Firestore 컬렉션으로 분리 적재한 현황을 한 눈에 확인</p>
  </header>
  <main>
    <section class="card" aria-labelledby="status-summary-title">
      <h2 id="status-summary-title">상태 요약</h2>
      <p id="status-summary">요약 정보를 불러오는 중입니다...</p>
      <p id="status-timestamp" style="margin-top: .5rem; color: rgba(255,255,255,.6);"></p>
    </section>
    <section class="card" aria-labelledby="program-status-title">
      <h2 id="program-status-title">프로그램별 적재 현황</h2>
      <ul class="program-list" id="program-summaries">
        <li>데이터를 불러오는 중입니다...</li>
      </ul>
    </section>
  </main>
  <footer>
    <p>logs/firestore_ingestion.log · reports/firestore_ingestion_summary.json</p>
  </footer>
  <script>
    async function renderStatus() {
      const target = document.getElementById("status-summary");
      const timestamp = document.getElementById("status-timestamp");
      const list = document.getElementById("program-summaries");
      try {
        const resp = await fetch("/reports/firestore_ingestion_summary.json");
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        const total = data.global.success_count + data.global.failure_count;
        target.textContent = `총 ${total}건 처리됨 · 성공 ${data.global.success_count}건 · 실패 ${data.global.failure_count}건`; 
        timestamp.textContent = `생성 시각: ${data.generated_at}`;
        list.innerHTML = "";
        Object.entries(data.programs).forEach(([programId, detail]) => {
          const li = document.createElement("li");
          const successColor = detail.failure_count === 0 ? "success" : "warning";
          li.innerHTML = `
            <strong>${programId}</strong>
            <div class="metric"><span>${detail.success_count}</span>성공</div>
            <div class="metric"><span>${detail.failure_count}</span>실패</div>
            <div>시도: ${detail.documents_attempted}</div>
            <div class="status-label ${successColor}">
              ${detail.failure_count === 0 ? "정상" : "에러"}
            </div>
          `;
          list.appendChild(li);
        });
      } catch (error) {
        target.textContent = `요약 로드 실패: ${error.message}`;
        list.innerHTML = "<li>reports/firestore_ingestion_summary.json을 찾을 수 없음</li>";
      }
    }
    renderStatus();
  </script>
</body>
</html>
