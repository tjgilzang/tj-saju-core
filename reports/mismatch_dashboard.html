<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mismatch 자동 리포트 대시보드</title>
  <style>
    :root {
      font-family: "Noto Sans KR", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    body {
      margin: 0;
      min-height: 100vh;
    }
    main {
      padding: 2rem;
      max-width: 1024px;
      margin: auto;
    }
    h1 {
      margin-bottom: 0.25rem;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    button {
      border: none;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-size: 1rem;
      padding: 0.65rem 1.3rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    button:focus-visible,
    button:hover {
      transform: translateY(-1px);
    }
    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .status-ok {
      background: #047857;
    }
    .status-alert {
      background: #b91c1c;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin: 1rem 0 2rem;
    }
    .card {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 1rem;
      padding: 1rem;
      min-height: 120px;
    }
    .card strong {
      display: block;
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 0.35rem;
    }
    .card .value {
      font-size: 1.6rem;
      font-weight: 700;
    }
    section.details {
      margin-top: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.5rem;
    }
    table th,
    table td {
      padding: 0.65rem 0.5rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      text-align: left;
      font-size: 0.95rem;
    }
    table th {
      font-weight: 600;
      color: #e0f2fe;
    }
    ul {
      margin: 0;
      padding-left: 1.1rem;
    }
    li {
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }
    #alert {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 0.8rem;
      background: rgba(248, 113, 113, 0.18);
      border: 1px solid rgba(248, 113, 113, 0.4);
      display: none;
    }
    #alert.visible {
      display: block;
    }
    .category-grid {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .category-block {
      background: rgba(30, 41, 59, 0.9);
      border-radius: 0.75rem;
      padding: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }
    .category-block header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .category-block header h3 {
      margin: 0;
      font-size: 1.05rem;
    }
    .category-block ul {
      margin-top: 0.5rem;
      max-height: 160px;
      overflow: auto;
    }
    .log-section {
      margin-top: 2rem;
    }
    .log-section pre {
      background: rgba(248, 250, 252, 0.05);
      border-radius: 0.7rem;
      padding: 1rem;
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div>
        <h1>Mismatch 자동 리포트 대시보드</h1>
        <p>양/음력, 월주/일주/시주 계산 정합성을 빠르게 확인합니다.</p>
      </div>
      <button id="refreshBtn">리포트 새로고침</button>
    </div>
    <div class="summary">
      <div class="grid">
        <article class="card">
          <strong>상태</strong>
          <div id="statusBadge" class="status-badge status-ok">불러오는 중...</div>
        </article>
        <article class="card">
          <strong>총 케이스</strong>
          <div id="checkedCases" class="value">—</div>
        </article>
        <article class="card">
          <strong>Mismatch 카운트</strong>
          <div id="mismatchCount" class="value">—</div>
        </article>
        <article class="card">
          <strong>Missing / Extra</strong>
          <div id="missingExtra" class="value">—</div>
        </article>
      </div>
      <div id="alert" role="status"></div>
    </div>

    <section class="details">
      <header>
        <h2>카테고리별 집중 확인</h2>
        <p id="retryInfo">재실행 로그 준비 중...</p>
      </header>
      <div class="category-grid" id="categoryGrid"></div>
    </section>

    <section class="log-section">
      <h2>최근 재실행 로그</h2>
      <pre id="logText">로그 로딩 중...</pre>
    </section>
  </main>

  <script>
    const summaryUrl = "./mismatch/mismatch_summary.json";
    const refreshBtn = document.getElementById("refreshBtn");
    const statusBadge = document.getElementById("statusBadge");
    const checkedCasesEl = document.getElementById("checkedCases");
    const mismatchCountEl = document.getElementById("mismatchCount");
    const missingExtraEl = document.getElementById("missingExtra");
    const alertEl = document.getElementById("alert");
    const retryInfoEl = document.getElementById("retryInfo");
    const categoryGrid = document.getElementById("categoryGrid");
    const logText = document.getElementById("logText");

    async function hydrate() {
      try {
        const resp = await fetch(summaryUrl + "?_=" + Date.now());
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }
        const payload = await resp.json();
        checkedCasesEl.textContent = payload.checked_cases;
        mismatchCountEl.textContent = payload.field_mismatches;
        missingExtraEl.textContent = `${payload.missing_actual} / ${payload.unexpected_actual}`;

        const label = payload.status === "OK" ? "mismatch 0" : "mismatch 존재";
        statusBadge.textContent = label;
        statusBadge.classList.toggle("status-ok", payload.status === "OK");
        statusBadge.classList.toggle("status-alert", payload.status !== "OK");

        alertEl.textContent = payload.alert_text;
        alertEl.classList.toggle("visible", payload.total_issues > 0);

        const attempts = payload.retry.attempts || [];
        retryInfoEl.textContent = `재실행 ${attempts.length}회 / 최대 ${payload.retry.max_retries}회`;
        logText.textContent = attempts
          .map((run) =>
            `시도 ${run.attempt} · ${run.timestamp} · mismatch ${run.field_mismatches} · missing ${run.missing_actual} · unexpected ${run.unexpected_actual}`
          )
          .join("\n") || "로그 없음";

        categoryGrid.innerHTML = "";
        const details = payload.category_details || {};
        Object.entries(details).forEach(([category, entries]) => {
          const block = document.createElement("div");
          block.className = "category-block";
          const header = document.createElement("header");
          const title = document.createElement("h3");
          title.textContent = `${category} (${entries.length})`;
          const badge = document.createElement("span");
          badge.textContent = `${entries.length}`;
          header.append(title, badge);
          block.appendChild(header);

          if (entries.length === 0) {
            const empty = document.createElement("p");
            empty.textContent = "불일치 없음";
            block.appendChild(empty);
          } else {
            const list = document.createElement("ul");
            entries.forEach((entry) => {
              const item = document.createElement("li");
              item.textContent = `${entry.case_id} · ${entry.field.split("_")[1]} · 기대=${entry.expected} / 실제=${entry.actual}`;
              list.appendChild(item);
            });
            block.appendChild(list);
          }
          categoryGrid.appendChild(block);
        });
      } catch (err) {
        statusBadge.textContent = "로드 실패";
        statusBadge.classList.add("status-alert");
        alertEl.classList.add("visible");
        alertEl.textContent = `리포트 로딩 실패: ${err.message}`;
        logText.textContent = err.stack || err.message;
      }
    }

    refreshBtn.addEventListener("click", () => {
      statusBadge.textContent = "새로고침 중...";
      hydrate();
    });

    hydrate();
  </script>
</body>
</html>
